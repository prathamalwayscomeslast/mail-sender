<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Configure Azure Credentials</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 60px auto; padding: 0 20px; }
        h2 { color: #1a1a2e; }
        label { font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 8px; margin: 6px 0 16px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #0078d4; color: white; padding: 10px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 15px; }
        button:hover { background: #005a9e; }
        .hint { font-size: 12px; color: #666; margin-top: -12px; margin-bottom: 12px; }
        header { border-bottom: 1px solid #e0e0e0; padding: 14px 0; margin-bottom: 32px; }
        header span { font-size: 18px; font-weight: bold; color: #1a1a2e; }
        header span em { color: #0078d4; font-style: normal; }
    </style>
</head>
<body>
    <header>
        <span>📧 Mail<em>Sender</em></span>
    </header>
    <h2>🔐 Configure Azure Credentials</h2>
    <p style="color:#555">Enter your Azure App Registration credentials to start sending emails via Microsoft Outlook SMTP.</p>
    <p style="font-size: 13px;">📖 Not sure where to find these? <a href="/help" style="color: #0078d4;">View the configuration guide -></a></p>
    <form th:action="@{/configure}" th:object="${config}" method="post">
        <label>Azure Client ID</label>
        <input type="text" th:field="*{clientId}" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" required/>

        <label>Azure Client Secret</label>
        <input type="password" th:field="*{clientSecret}" placeholder="Your client secret value" required/>
        <p class="hint">⚠️ Never share this. Stored in session only — cleared when you close the browser.</p>

        <label>Azure Tenant ID</label>
        <input type="text" th:field="*{tenantId}" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" required/>

        <label>From Email</label>
        <input type="email" th:field="*{fromEmail}" placeholder="jenkins@yourdomain.onmicrosoft.com" required/>

        <button type="submit">Save & Continue →</button>
    </form>
</body>
</html>
